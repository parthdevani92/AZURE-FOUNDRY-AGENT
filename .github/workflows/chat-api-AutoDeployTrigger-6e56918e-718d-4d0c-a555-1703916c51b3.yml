name: Trigger auto deployment for chat-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/chat-api-AutoDeployTrigger-6e56918e-718d-4d0c-a555-1703916c51b3.yml'

  # Allow manual trigger 
  workflow_dispatch:
      
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.CHATAPI_AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/chat_api
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: parthagenttoolsacr.azurecr.io
          registryUsername: ${{ secrets.CHATAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CHATAPI_REGISTRY_PASSWORD }}
          containerAppName: chat-api
          resourceGroup: rg-devraj.vasani-7916
          imageToBuild: parthagenttoolsacr.azurecr.io/chat-api:${{ github.sha }}
          
            

     

